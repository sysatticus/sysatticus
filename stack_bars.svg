<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 290 132" width="290" height="132">
  <style>
    .sk-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
