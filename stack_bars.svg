    .sk-bar-fill { fill: var(--sk-accent, #00ff41); }
    .sk-label { font-size: 13px; fill: var(--sk-muted, #0d660d); dominant-baseline: middle; }
    .sk-value { font-size: 13px; fill: var(--sk-fg, #00ff41); dominant-baseline: middle; }
    .sk-title { font-size: 15px; font-weight: 600; fill: var(--sk-fg, #00ff41); }
    .sk-star { fill: var(--sk-star, #39ff14); }
    .sk-desc { font-size: 12px; fill: var(--sk-muted, #0d660d); }
    .sk-card { fill: var(--sk-card-bg, #0f0f0f); stroke: var(--sk-border, #0d660d); stroke-width: 1; rx: 6; }
    @media (prefers-color-scheme: light) {
            --sk-bg: #f5f5f5;
      --sk-fg: #1a1a1a;
      --sk-accent: #006400;
      --sk-track: #d4d4d4;
      --sk-muted: #666666;
      --sk-border: #b0b0b0;
      --sk-card_bg: #ffffff;
      --sk-star_color: #f0c14b;
    }
