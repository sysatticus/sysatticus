<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" width="480" height="180">
  <style>
    .card-bg { fill: transparent; stroke: #30363d; stroke-width: 1; rx: 6; }
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #c9d1d9; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; fill: #8b949e; }
    .star { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #f0c14b; }
    @media (prefers-color-scheme: light) {
      .card-bg { stroke: #d0d7de; }
      .title { fill: #1f2328; }
      .desc { fill: #656d76; }
      .star { fill: #f0c14b; }
    }
  </style>
  <rect class="card-bg" x="10" y="5" width="190" height="55"/>
  <text class="title" x="22" y="28">clipp ★ <tspan class="star" id="clipp-stars">2</tspan></text>
  <text class="desc" x="22" y="46">Smart clipboard historian for your terminal</text>

  <rect class="card-bg" x="220" y="5" width="190" height="55"/>
  <text class="title" x="232" y="28">dir2md ★ <tspan class="star" id="dir2md-stars">2</tspan></text>
  <text class="desc" x="232" y="46">Directory → markdown for AI context</text>

  <rect class="card-bg" x="10" y="65" width="190" height="55"/>
  <text class="title" x="22" y="88">webqs ★ <tspan class="star" id="webqs-stars">2</tspan></text>
  <text class="desc" x="22" y="106">Web search + scrape from the terminal</text>

  <rect class="card-bg" x="220" y="65" width="190" height="55"/>
  <text class="title" x="232" y="88">svgkit ★ <tspan class="star" id="svgkit-stars">2</tspan></text>
  <text class="desc" x="232" y="106">Themed SVG widgets for GitHub READMEs</text>

  <rect class="card-bg" x="10" y="125" width="190" height="55"/>
  <text class="title" x="22" y="148">whyframe ★ <tspan class="star" id="whyframe-stars">2</tspan></text>
  <text class="desc" x="22" y="166">Ask your repo why — codebase reasoning</text>
</svg>