<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" width="400" height="350">
  <style>
    .sk-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .sk-bar-track { fill: var(--sk-track, #1a1a1a); }
    .sk-bar-fill { fill: var(--sk-accent, #00ff41); }
    .sk-label { font-size: 13px; fill: var(--sk-muted, #0d660d); dominant-baseline: middle; }
    .sk-value { font-size: 13px; fill: var(--sk-fg, #00ff41); dominant-baseline: middle; }
    .sk-title { font-size: 15px; font-weight: 600; fill: var(--sk-fg, #00ff41); }
    .sk-star { fill: var(--sk-star, #39ff14); }
    .sk-desc { font-size: 12px; fill: var(--sk-muted, #0d660d); }
    .sk-card { fill: var(--sk-card-bg, #0f0f0f); stroke: var(--sk-border, #0d660d); stroke-width: 1; rx: 6; }
    @media (prefers-color-scheme: light) {
            --sk-bg: #f5f5f5;
      --sk-fg: #1a1a1a;
      --sk-accent: #006400;
      --sk-track: #d4d4d4;
      --sk-muted: #666666;
      --sk-border: #b0b0b0;
      --sk-card_bg: #ffffff;
      --sk-star_color: #f0c14b;
    }
  </style>
  <rect class="sk-card" x="5" y="5" width="380" height="60"/>
  <text class="sk-title" x="18" y="27">clipp</text>
  <text class="sk-desc" x="18" y="47">Smart clipboard historian for your terminal</text>
  <text class="sk-star" x="370" y="27" text-anchor="end">★ 2</text>
  <rect class="sk-card" x="5" y="75" width="380" height="60"/>
  <text class="sk-title" x="18" y="97">dir2md</text>
  <text class="sk-desc" x="18" y="117">Directory to markdown for AI context windows</text>
  <text class="sk-star" x="370" y="97" text-anchor="end">★ 2</text>
  <rect class="sk-card" x="5" y="145" width="380" height="60"/>
  <text class="sk-title" x="18" y="167">webqs</text>
  <text class="sk-desc" x="18" y="187">Web search and scrape CLI powered by SearXNG</text>
  <text class="sk-star" x="370" y="167" text-anchor="end">★ 2</text>
  <rect class="sk-card" x="5" y="215" width="380" height="60"/>
  <text class="sk-title" x="18" y="237">svgkit</text>
  <text class="sk-desc" x="18" y="257">Python library for themed SVG widgets in READMEs</text>
  <text class="sk-star" x="370" y="237" text-anchor="end">★ 2</text>
  <rect class="sk-card" x="5" y="285" width="380" height="60"/>
  <text class="sk-title" x="18" y="307">whyframe</text>
  <text class="sk-desc" x="18" y="327">Ask your repo why — codebase reasoning</text>
  <text class="sk-star" x="370" y="307" text-anchor="end">★ 2</text>
</svg>