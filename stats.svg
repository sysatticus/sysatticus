<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 90" width="340" height="90">
  <style>
    .sk-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .sk-bar-track { fill: var(--sk-track, #1a1a1a); }
    .sk-bar-fill { fill: var(--sk-accent, #00ff41); }
    .sk-label { font-size: 13px; fill: var(--sk-muted, #0d660d); dominant-baseline: middle; }
    .sk-value { font-size: 13px; fill: var(--sk-fg, #00ff41); dominant-baseline: middle; }
    .sk-title { font-size: 15px; font-weight: 600; fill: var(--sk-fg, #00ff41); }
    .sk-star { fill: var(--sk-star, #39ff14); }
    .sk-desc { font-size: 12px; fill: var(--sk-muted, #0d660d); }
    .sk-card { fill: var(--sk-card-bg, #0f0f0f); stroke: var(--sk-border, #0d660d); stroke-width: 1; rx: 6; }
    @media (prefers-color-scheme: light) {
            --sk-bg: #f5f5f5;
      --sk-fg: #1a1a1a;
      --sk-accent: #006400;
      --sk-track: #d4d4d4;
      --sk-muted: #666666;
      --sk-border: #b0b0b0;
      --sk-card_bg: #ffffff;
      --sk-star_color: #f0c14b;
    }
  </style>
  <rect class="sk-card" x="0" y="0" width="340" height="90"/>
  <text class="sk-title" x="42" y="37" text-anchor="middle">★ 10</text>
  <text class="sk-desc" x="42" y="61" text-anchor="middle">Stars</text>
  <text class="sk-title" x="127" y="37" text-anchor="middle">⟨⟩ 50</text>
  <text class="sk-desc" x="127" y="61" text-anchor="middle">Commits</text>
  <text class="sk-title" x="212" y="37" text-anchor="middle">📦 5</text>
  <text class="sk-desc" x="212" y="61" text-anchor="middle">Repos</text>
  <text class="sk-title" x="297" y="37" text-anchor="middle">⊕ 200</text>
  <text class="sk-desc" x="297" y="61" text-anchor="middle">Contribs</text>
</svg>