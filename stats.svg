<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 70" width="440" height="70">
  <style>
    .card-bg { fill: transparent; stroke: #30363d; stroke-width: 1; rx: 6; }
    .stat-val { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #c9d1d9; dominant-baseline: middle; }
    .stat-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #8b949e; }
    .accent { fill: #58a6ff; }
    @media (prefers-color-scheme: light) {
      .card-bg { stroke: #d0d7de; }
      .stat-val { fill: #1f2328; }
      .stat-label { fill: #656d76; }
      .accent { fill: #0969da; }
    }
  </style>
  <rect class="card-bg" x="0" y="0" width="440" height="70"/>
  <text class="stat-val" x="55" y="32" text-anchor="middle" id="total-stars">2</text>
  <text class="stat-label" x="55" y="52" text-anchor="middle">★ Stars</text>
  <text class="stat-val" x="165" y="32" text-anchor="middle">50</text>
  <text class="stat-label" x="165" y="52" text-anchor="middle">Commits</text>
  <text class="stat-val accent" x="275" y="32" text-anchor="middle">6</text>
  <text class="stat-label" x="275" y="52" text-anchor="middle">Repos</text>
  <text class="stat-val" x="385" y="32" text-anchor="middle">200+</text>
  <text class="stat-label" x="385" y="52" text-anchor="middle">Contribs</text>
</svg>