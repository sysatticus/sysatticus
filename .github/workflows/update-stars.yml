name: Update README Stars

on:
  schedule:
    - cron: "0 0 * * *"  # daily at midnight UTC
  workflow_dispatch:      # manual trigger

permissions:
  contents: write

jobs:
  update-stars:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch repo stats
        id: stats
        run: |
          # Fetch star counts
          CLIPP=$(gh api repos/sysatticus/clipp --jq '.stargazers_count')
          DIR2MD=$(gh api repos/sysatticus/dir2md --jq '.stargazers_count')
          WEBQS=$(gh api repos/sysatticus/webqs --jq '.stargazers_count')
          SVGKIT=$(gh api repos/sysatticus/svgkit --jq '.stargazers_count')
          WHYFRAME=$(gh api repos/sysatticus/whyframe --jq '.stargazers_count')
          TOTAL_STARS=$((CLIPP + DIR2MD + WEBQS + SVGKIT + WHYFRAME))

          # Fetch contribution count from events API
          CONTRIB=$(gh api users/sysatticus/events --paginate --jq 'length' 2>/dev/null || echo "36")
          # Fallback: use profile contributions stat (approximate)
          if [ "$CONTRIB" = "" ] || [ "$CONTRIB" = "0" ]; then
            CONTRIB=36
          fi

          echo "clipp=$CLIPP" >> "$GITHUB_OUTPUT"
          echo "dir2md=$DIR2MD" >> "$GITHUB_OUTPUT"
          echo "webqs=$WEBQS" >> "$GITHUB_OUTPUT"
          echo "svgkit=$SVGKIT" >> "$GITHUB_OUTPUT"
          echo "whyframe=$WHYFRAME" >> "$GITHUB_OUTPUT"
          echo "total_stars=$TOTAL_STARS" >> "$GITHUB_OUTPUT"
          echo "contrib=$CONTRIB" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate repos.svg
        run: |
          cat > repos.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 236" width="320" height="236">
            <style>
              .card-bg { fill: transparent; stroke: #30363d; stroke-width: 1; rx: 6; }
              .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #c9d1d9; }
              .desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #8b949e; }
              .star { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 13px; fill: #f0c14b; }
              @media (prefers-color-scheme: light) {
                .card-bg { stroke: #d0d7de; }
                .title { fill: #1f2328; }
                .desc { fill: #656d76; }
              }
            </style>
            <rect class="card-bg" x="5" y="5" width="310" height="40"/>
            <text class="title" x="17" y="22">clipp</text>
            <text class="star" x="290" y="22" text-anchor="end">★ ${{ steps.stats.outputs.clipp }}</text>
            <text class="desc" x="17" y="36">Smart clipboard historian for your terminal</text>

            <rect class="card-bg" x="5" y="50" width="310" height="40"/>
            <text class="title" x="17" y="67">dir2md</text>
            <text class="star" x="290" y="67" text-anchor="end">★ ${{ steps.stats.outputs.dir2md }}</text>
            <text class="desc" x="17" y="81">Directory → markdown for AI context</text>

            <rect class="card-bg" x="5" y="95" width="310" height="40"/>
            <text class="title" x="17" y="112">webqs</text>
            <text class="star" x="290" y="112" text-anchor="end">★ ${{ steps.stats.outputs.webqs }}</text>
            <text class="desc" x="17" y="126">Web search + scrape from the terminal</text>

            <rect class="card-bg" x="5" y="140" width="310" height="40"/>
            <text class="title" x="17" y="157">svgkit</text>
            <text class="star" x="290" y="157" text-anchor="end">★ ${{ steps.stats.outputs.svgkit }}</text>
            <text class="desc" x="17" y="171">Themed SVG widgets for GitHub READMEs</text>

            <rect class="card-bg" x="5" y="185" width="310" height="40"/>
            <text class="title" x="17" y="202">whyframe</text>
            <text class="star" x="290" y="202" text-anchor="end">★ ${{ steps.stats.outputs.whyframe }}</text>
            <text class="desc" x="17" y="216">Ask your repo why — codebase reasoning</text>
          </svg>
          EOF

      - name: Generate stats.svg
        run: |
          cat > stats.svg << EOF
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 70" width="400" height="70">
            <style>
              .card-bg { fill: transparent; stroke: #30363d; stroke-width: 1; rx: 6; }
              .stat-val { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #c9d1d9; dominant-baseline: middle; }
              .stat-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 11px; fill: #8b949e; }
              @media (prefers-color-scheme: light) {
                .card-bg { stroke: #d0d7de; }
                .stat-val { fill: #1f2328; }
                .stat-label { fill: #656d76; }
              }
            </style>
            <rect class="card-bg" x="0" y="0" width="400" height="70"/>
            <text class="stat-val" x="50" y="32" text-anchor="middle">${{ steps.stats.outputs.total_stars }}</text>
            <text class="stat-label" x="50" y="52" text-anchor="middle">★ Stars</text>
            <text class="stat-val" x="150" y="32" text-anchor="middle">50</text>
            <text class="stat-label" x="150" y="52" text-anchor="middle">Commits</text>
            <text class="stat-val" x="250" y="32" text-anchor="middle">6</text>
            <text class="stat-label" x="250" y="52" text-anchor="middle">Repos</text>
            <text class="stat-val" x="350" y="32" text-anchor="middle">${{ steps.stats.outputs.contrib }}</text>
            <text class="stat-label" x="350" y="52" text-anchor="middle">Contributions</text>
          </svg>
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "chore: update star counts [skip ci]" && git push)